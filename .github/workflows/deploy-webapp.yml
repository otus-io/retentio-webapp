---
# Deploy to production over SSH: pull main, install, build, run via systemd.
#
# Production app directory: ~/otusio/retentio-webapp (same layout as backend deploy)
#
# Repository secrets (Settings → Secrets and variables → Actions):
#   SERVER_HOST       — hostname or IP
#   SERVER_USERNAME   — SSH user (e.g. otus)
#   SERVER_SSH_KEY    — private key for that user; matching public key in ~/.ssh/authorized_keys on the server
#
# Non-default SSH port: add `port: YOUR_PORT` under `with:` in the ssh-action step (default is 22).
#
# Server prerequisites:
#   — Git, Node.js >=20.9 on PATH (Next.js). Non-interactive SSH: install via nvm and ensure the script
#     below can run `nvm use 20` (nvm.sh + Node 20 installed), or use system Node 20+ (e.g. NodeSource).
#   — pnpm on PATH (~/.profile / ~/.bashrc)
#   — Passwordless sudo for cp/enable/restart of retentio-webapp.service (see retentio-backend/docs/server-side-config.md pattern)
#   — Repo cloned at ~/otusio/retentio-webapp with origin able to fetch this repository

name: Deploy Webapp

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-webapp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/otusio/retentio-webapp
            source ~/.profile 2>/dev/null || true
            source ~/.bashrc 2>/dev/null || true
            export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
              nvm use 20 2>/dev/null || nvm use default 2>/dev/null || true
            fi
            NODE_MAJOR="$(node -v 2>/dev/null | sed 's/^v//' | cut -d. -f1 || echo 0)"
            if [ "${NODE_MAJOR:-0}" -lt 20 ]; then
              echo "Node.js >= 20.9 is required (see package.json engines). Got: $(node -v 2>/dev/null || echo 'not found')"
              echo "Fix on server: nvm install 20 && nvm alias default 20  (or install Node 20+ system-wide)"
              exit 1
            fi
            node -v
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            export HUSKY=0
            pnpm install --frozen-lockfile
            pnpm run build
            sudo cp ~/otusio/retentio-webapp/utils/retentio-webapp.service /etc/systemd/system/retentio-webapp.service
            sudo systemctl daemon-reload
            sudo systemctl enable retentio-webapp
            sudo systemctl restart retentio-webapp || exit 1
