---
# CI on push/PR to main; deploy to production after CI passes on push to main or manual run.
#
# Deploy secrets: SERVER_HOST, SERVER_USERNAME, SERVER_SSH_KEY
# E2E secrets: E2E_USERNAME, E2E_PASSWORD
#
# Server prerequisites:
#   — Git, Node.js >=20.9, pnpm v9 at ~/otusio/retentio-webapp
#   — Passwordless sudo for cp utils/retentio-webapp.service and systemctl enable/restart

name: Build, test & deploy webapp

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to production after CI passes
        type: boolean
        default: true

jobs:
  lint-and-build:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Lint
        run: pnpm run lint:ci

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm run test:e2e
        env:
          CI: true
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

  deploy:
    needs: lint-and-build
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy)
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-webapp
      cancel-in-progress: true

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/otusio/retentio-webapp
            source ~/.profile 2>/dev/null || true
            source ~/.bashrc 2>/dev/null || true
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
              nvm use 2>/dev/null || nvm use default 2>/dev/null || true
            fi
            REQUIRED_NODE_VERSION="20.9.0"
            NODE_VERSION="$(node -v 2>/dev/null | sed 's/^v//' || echo 0)"
            if [ "$(printf '%s\n' "$REQUIRED_NODE_VERSION" "$NODE_VERSION" | sort -V | head -n1)" != "$REQUIRED_NODE_VERSION" ]; then
              echo "node $NODE_VERSION found; require >=$REQUIRED_NODE_VERSION (see package.json engines)"
              exit 1
            fi
            node -v
            corepack enable 2>/dev/null || true
            if ! pnpm --version 2>/dev/null | grep -q '^9\.'; then
              corepack prepare pnpm@9 --activate 2>/dev/null || npm install -g pnpm@9
            fi
            export HUSKY=0
            export CI=true
            pnpm install --frozen-lockfile
            pnpm run build
            sudo cp ~/otusio/retentio-webapp/utils/retentio-webapp.service /etc/systemd/system/retentio-webapp.service
            sudo systemctl daemon-reload
            sudo systemctl enable retentio-webapp
            sudo systemctl restart retentio-webapp || exit 1
