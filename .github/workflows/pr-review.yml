---
# PR description auto-fill and Claude Code review (anthropics/claude-code-action).
# Requires: ANTHROPIC_API_KEY repository secret and the Claude GitHub App
# (https://github.com/apps/claude) or /install-github-app from Claude Code.
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Job 1: Auto-fill PR description (only on opened)
  summarize:
    if: github.event.pull_request.draft == false && github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Auto-fill PR description
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            // --- Preflight ---
            if (!process.env.ANTHROPIC_API_KEY) {
              core.setFailed('ANTHROPIC_API_KEY secret is not set.');
              return;
            }

            const pull_number = context.payload.pull_request.number;
            const prTitle = context.payload.pull_request.title;
            const prBody = context.payload.pull_request.body || '';

            const hasContent = prBody.includes('[x]') ||
              (prBody.includes('## Description') &&
               prBody.split('## Description')[1]?.split('##')[0]?.replace(/<!--[\s\S]*?-->/g, '').trim().length > 0);
            if (hasContent) {
              console.log('PR body already has content, skipping Claude auto-fill');
              return;
            }

            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number,
              per_page: 100
            });
            const commitMessages = commits.map(c => `- ${c.commit.message}`).join('\n');

            const SKIP_PATTERNS = [
              /\.lock$/, /package-lock\.json$/, /yarn\.lock$/, /pnpm-lock\.yaml$/,
              /^public\/search-index\/.*\.json$/,
              /\.min\.(js|css)$/, /\.generated\./
            ];
            const MAX_DIFF_SIZE = 12000;

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number,
              per_page: 100
            });

            const reviewable = files.filter(f =>
              f.patch &&
              !SKIP_PATTERNS.some(p => p.test(f.filename))
            );

            let diff = '';
            for (const file of reviewable) {
              diff += `=== ${file.filename} (${file.status}, +${file.additions} -${file.deletions}) ===\n${file.patch}\n\n`;
            }
            if (diff.length > MAX_DIFF_SIZE) {
              diff = diff.substring(0, MAX_DIFF_SIZE) + '\n\n... (diff truncated)';
            }

            const prompt = [
              'Auto-fill a PR description. Analyze the title, commits, and diff below.',
              '',
              `PR Title: ${prTitle}`,
              '',
              'Commits:',
              commitMessages,
              '',
              'Diff:',
              diff,
              '',
              'Return ONLY markdown with these sections (do NOT add any text before the first ## header):',
              '',
              '## What type of PR is this?',
              'Mark applicable types with [x]: feat, fix, docs, refactor, test, ci, chore',
              '(Use format: - [x] `type` - Description)',
              '',
              '## Description',
              '2-4 sentences on what changed and why.',
              '',
              '## Changes Overview',
              'Brief bullet summary of files or areas changed.',
              '',
              '## How Has This Been Tested?',
              'Mark applicable with [x]: Unit tests, E2E tests, Manual testing, N/A',
              '(Use format: - [x] Item)',
              '',
              '## Checklist',
              'Mark applicable with [x]: code style, self-review, tests added, tests pass, docs updated, i18n (en + zh)',
              '(Use format: - [x] Item)'
            ].join('\n');

            let apiResult;
            try {
              const resp = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'x-api-key': process.env.ANTHROPIC_API_KEY,
                  'anthropic-version': '2023-06-01'
                },
                body: JSON.stringify({
                  model: 'claude-sonnet-4-5-20250929',
                  max_tokens: 2048,
                  messages: [{ role: 'user', content: prompt }]
                })
              });
              if (!resp.ok) {
                const errorText = await resp.text();
                throw new Error(`HTTP ${resp.status}: ${errorText}`);
              }
              apiResult = await resp.json();
            } catch (e) {
              core.setFailed(`Claude API request failed: ${e.message}`);
              return;
            }

            let body = apiResult.content?.[0]?.text;
            if (!body) {
              core.warning('Empty response from Claude API');
              return;
            }

            const firstHeaderIdx = body.search(/^## /m);
            if (firstHeaderIdx > 0) {
              const preamble = body.substring(0, firstHeaderIdx).trim();
              body = body.substring(firstHeaderIdx);
              if (preamble) {
                body = body.replace(/(## Description[^\n]*\n)/, `$1\n${preamble}\n`);
              }
            }

            body = body.replace(/^- \[ \] .+\n?/gm, '');
            body = body.replace(/\n{3,}/g, '\n\n').trim();

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number,
              body
            });

            console.log(`PR #${pull_number} description auto-filled by Claude`);

  # Job 2: Claude Code review
  review:
    needs: [summarize]
    if: always() && github.event.pull_request.draft == false && (needs.summarize.result == 'success' || needs.summarize.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this Next.js webapp pull request. Focus on:
            - Logic errors, race conditions, and React rendering bugs
            - Security (auth cookie handling, XSS, unsafe HTML, API input validation)
            - Server vs client component boundaries ("use client" only when needed)
            - i18n: user-visible strings in both en.json and zh.json
            - API usage via src/utils/request.ts and src/modules/
            - Test coverage for behavior changes (unit tests; e2e for auth/navigation)

            Skip lockfiles, generated public/search-index/, and build artifacts.
            Follow CLAUDE.md / AGENTS.md and .cursor/rules when applicable.

            The PR branch is already checked out in the working directory.

            Start the top-level summary with "## 🤖 Claude Code Review".
            Use `gh pr comment` for the summary.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) only for real bugs — not style or naming nits.
            Do not submit a formal APPROVE or REQUEST CHANGES review event.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 25
            --allowedTools "Read,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),mcp__github_inline_comment__create_inline_comment"
